services:
  attachment-volume-init:
    image: alpine:3.22.1
    user: "0:0"
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    command:
      - sh
      - -ec
      - chown -R 65532:65532 /attachments && chmod 700 /attachments
    volumes:
      - pipauto_surrealdb_attachments:/attachments
    restart: "no"

  surrealdb:
    image: surrealdb/surrealdb:v3.2.1
    working_dir: /home/nonroot
    command: ["start", "--log", "info"]
    environment:
      SURREAL_USER: ${SURREALDB_ROOT_USERNAME:?SURREALDB_ROOT_USERNAME is required}
      SURREAL_PASS: ${SURREALDB_ROOT_PASSWORD:?SURREALDB_ROOT_PASSWORD is required}
      SURREAL_PATH: rocksdb://pipauto
      SURREAL_DEFAULT_NAMESPACE: ${SURREALDB_NAMESPACE:?SURREALDB_NAMESPACE is required}
      SURREAL_DEFAULT_DATABASE: ${SURREALDB_DATABASE:?SURREALDB_DATABASE is required}
      SURREAL_CAPS_ALLOW_EXPERIMENTAL: files
      SURREAL_BUCKET_FOLDER_ALLOWLIST: /home/nonroot/pipauto_attachments
    ports:
      - "8000:8000"
    volumes:
      - pipauto_surrealdb_development:/home/nonroot
      - pipauto_surrealdb_attachments:/home/nonroot/pipauto_attachments
    depends_on:
      attachment-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

volumes:
  pipauto_surrealdb_development:
    name: pipauto_surrealdb_development
  pipauto_surrealdb_attachments:
    name: pipauto_surrealdb_attachments
