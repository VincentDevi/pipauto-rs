services:
  attachment-volume-init:
    image: alpine:3.22.1
    user: "0:0"
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    command:
      - sh
      - -ec
      - chown -R 65532:65532 /attachments && chmod 700 /attachments
    volumes:
      - pipauto_surrealdb_attachments_ci:/attachments
    restart: "no"

  surrealdb:
    image: surrealdb/surrealdb:v3.2.1
    command: ["start", "--log", "warn", "memory"]
    environment:
      SURREAL_USER: root
      SURREAL_PASS: local-ci-only
      SURREAL_CAPS_ALLOW_EXPERIMENTAL: files
      SURREAL_BUCKET_FOLDER_ALLOWLIST: /home/nonroot/pipauto_attachments
    volumes:
      - pipauto_surrealdb_attachments_ci:/home/nonroot/pipauto_attachments
    depends_on:
      attachment-volume-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:18000:8000"
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 3s

volumes:
  pipauto_surrealdb_attachments_ci:
