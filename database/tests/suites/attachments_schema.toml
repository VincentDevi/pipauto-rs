name = "attachments_schema"
tags = ["attachments", "metadata"]

[[cases]]
name = "attachment_table_is_schemafull"
kind = "schema_metadata"
sql = "INFO FOR DB;"
contains = [
    "DEFINE TABLE attachment TYPE NORMAL SCHEMAFULL PERMISSIONS NONE",
]

[[cases]]
name = "attachment_fields_and_indexes_match"
kind = "schema_metadata"
table = "attachment"
contains = [
    "DEFINE FIELD byte_size ON attachment TYPE none | int",
    "DEFINE FIELD caption ON attachment TYPE none | string",
    "DEFINE FIELD created_at ON attachment TYPE datetime DEFAULT time::now() READONLY",
    "DEFINE FIELD display_name ON attachment TYPE string",
    "DEFINE FIELD intervention ON attachment TYPE none | record<intervention>",
    "DEFINE FIELD media_type ON attachment TYPE string",
    "DEFINE FIELD storage_state ON attachment TYPE string DEFAULT 'metadata_only'",
    "DEFINE FIELD updated_at ON attachment TYPE datetime DEFAULT ALWAYS time::now()",
    "DEFINE FIELD vehicle ON attachment TYPE none | record<vehicle>",
    "REFERENCE ON DELETE REJECT",
    "DEFINE INDEX attachment_intervention ON attachment FIELDS intervention",
    "DEFINE INDEX attachment_storage_state ON attachment FIELDS storage_state",
    "DEFINE INDEX attachment_vehicle ON attachment FIELDS vehicle",
]

[[cases]]
name = "attachment_rejects_negative_byte_size"
kind = "sql_expect"
sql = "CREATE attachment:invalid CONTENT { vehicle: vehicle:missing, display_name: 'Photo.jpg', media_type: 'image/jpeg', byte_size: -1 };"
allow = false

[[cases]]
name = "attachment_rejects_unsupported_media_type"
kind = "sql_expect"
sql = "CREATE attachment:invalid_type CONTENT { vehicle: vehicle:missing, display_name: 'Data.bin', media_type: 'application/octet-stream' };"
allow = false
