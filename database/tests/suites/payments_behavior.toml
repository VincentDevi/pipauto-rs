name = "payments_behavior"
tags = ["payments", "behavior"]

[[cases]]
name = "payment_accepts_exact_outstanding_balance"
kind = "schema_behavior"
setup_sql = [
    "CREATE user:payment_user CONTENT { email: 'mechanic@example.com', email_normalized: 'mechanic@example.com', display_name: 'Mechanic', password_hash: '$argon2id$fixture' };",
    "CREATE customer:payment_owner CONTENT { display_name: 'Payment Owner', display_name_normalized: 'payment owner' };",
    "CREATE invoice:payment_invoice CONTENT { customer: customer:payment_owner };",
    "CREATE invoice_line:payment_line CONTENT { invoice: invoice:payment_invoice, description: 'Repair', quantity: 1dec, unit_label: 'job', currency: 'EUR', unit_price_minor: 10000, line_total_minor: 10000, position: 0 };",
    "UPDATE invoice:payment_invoice SET status = 'issued', issue_number = '2026-00100', issue_date = d'2026-07-19', customer_display_snapshot = 'Payment Owner', subtotal_minor = 10000, total_minor = 10000, issued_at = time::now();",
    "CREATE payment:first CONTENT { invoice: invoice:payment_invoice, amount_minor: 4000, currency: 'EUR', received_at: d'2026-07-19T11:00:00Z', method: 'cash', created_by: user:payment_user };",
]
action_sql = "CREATE payment:second CONTENT { invoice: invoice:payment_invoice, amount_minor: 6000, currency: 'EUR', received_at: d'2026-07-19T12:00:00Z', method: 'bank_transfer', reference: 'transfer-42', created_by: user:payment_user };"
expect_success = true
verify_sql = "RETURN math::sum((SELECT VALUE amount_minor FROM payment WHERE invoice = invoice:payment_invoice));"

[[cases.assertions]]
path = ""
equals = 10000

