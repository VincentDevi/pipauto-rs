[[cases]]
name = "recorded_payment_cannot_be_updated_or_deleted"
kind = "schema_behavior"
setup_sql = [
    "CREATE user:immutable_payment_user CONTENT { email: 'immutable@example.com', email_normalized: 'immutable@example.com', display_name: 'Mechanic', password_hash: '$argon2id$fixture' };",
    "CREATE customer:immutable_payment_owner CONTENT { display_name: 'Immutable Owner', display_name_normalized: 'immutable owner' };",
    "CREATE invoice:immutable_payment_invoice CONTENT { customer: customer:immutable_payment_owner };",
    "CREATE invoice_line:immutable_payment_line CONTENT { invoice: invoice:immutable_payment_invoice, description: 'Repair', quantity: 1dec, unit_label: 'job', currency: 'EUR', unit_price_minor: 1000, line_total_minor: 1000, position: 0 };",
    "UPDATE invoice:immutable_payment_invoice SET status = 'issued', issue_number = '2026-00102', issue_date = d'2026-07-19', customer_display_snapshot = 'Immutable Owner', subtotal_minor = 1000, total_minor = 1000, issued_at = time::now();",
    "CREATE payment:immutable CONTENT { invoice: invoice:immutable_payment_invoice, amount_minor: 100, currency: 'EUR', received_at: d'2026-07-19T12:00:00Z', method: 'cash', created_by: user:immutable_payment_user };",
]
action_sql = "UPDATE payment:immutable SET amount_minor = 200;"
expect_success = false
verify_sql = "RETURN payment:immutable.amount_minor;"

[[cases.assertions]]
path = ""
equals = 100

