[[cases]]
name = "vehicle_current_mileage_update_does_not_rewrite_history"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:current_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:current_vehicle CONTENT { customer: customer:current_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf', current_mileage: 100000 };",
    "CREATE intervention:historical_mileage CONTENT { vehicle: vehicle:current_vehicle, service_date: d'2026-07-01T00:00:00Z', mileage: 100000 };",
]
action_sql = "UPDATE vehicle:current_vehicle SET current_mileage = 125000;"
expect_success = true
verify_sql = "RETURN intervention:historical_mileage.mileage;"

[[cases.assertions]]
path = ""
equals = 100000
