name = "interventions_mileage"
tags = ["interventions", "mileage"]

[[cases]]
name = "current_and_equal_mileage_are_allowed"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:mileage_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:mileage_vehicle CONTENT { customer: customer:mileage_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:mileage_first CONTENT { vehicle: vehicle:mileage_vehicle, service_date: d'2026-07-01T00:00:00Z', mileage: 100000 };",
]
action_sql = "CREATE intervention:mileage_current CONTENT { vehicle: vehicle:mileage_vehicle, service_date: d'2026-07-20T00:00:00Z', mileage: 100000 };"
expect_success = true

