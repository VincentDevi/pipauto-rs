name = "attachments_behavior"
tags = ["attachments", "behavior"]

[[cases]]
name = "vehicle_owner_accepts_pending_attachment"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:attachment_owner CONTENT { display_name: 'Attachment Owner', display_name_normalized: 'attachment owner' };",
    "CREATE vehicle:attachment_vehicle CONTENT { customer: customer:attachment_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
]
action_sql = "CREATE attachment:vehicle_photo CONTENT { vehicle: vehicle:attachment_vehicle, display_name: 'Water pump.jpg', media_type: 'image/jpeg', file: f'pipauto_attachments:/vehicle-photo', storage_state: 'pending' };"
expect_success = true
verify_sql = "RETURN count(SELECT * FROM attachment WHERE id = attachment:vehicle_photo AND vehicle = vehicle:attachment_vehicle AND intervention IS NONE AND technical_note IS NONE AND storage_state = 'pending');"

[[cases.assertions]]
path = ""
equals = 1

[[cases]]
name = "intervention_owner_accepts_stored_attachment"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:job_attachment_owner CONTENT { display_name: 'Job Attachment Owner', display_name_normalized: 'job attachment owner' };",
    "CREATE vehicle:job_attachment_vehicle CONTENT { customer: customer:job_attachment_owner, make: 'Peugeot', make_normalized: 'peugeot', model: '208', model_normalized: '208' };",
    "CREATE intervention:attachment_job CONTENT { vehicle: vehicle:job_attachment_vehicle, service_date: d'2026-07-19T09:00:00Z', estimated_duration_minutes: 60, customer_snapshot_id: customer:job_attachment_owner, customer_snapshot_name: 'Job Attachment Owner', vehicle_snapshot_make: 'Peugeot', vehicle_snapshot_model: '208' };",
]
action_sql = "CREATE attachment:job_pdf CONTENT { intervention: intervention:attachment_job, display_name: 'Diagnostic report.pdf', media_type: 'application/pdf', file: f'pipauto_attachments:/job-pdf', byte_size: 24512, sha256: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa', storage_state: 'stored' };"
expect_success = true
verify_sql = "RETURN count(SELECT * FROM attachment WHERE id = attachment:job_pdf AND vehicle IS NONE AND intervention = intervention:attachment_job AND technical_note IS NONE AND storage_state = 'stored');"

[[cases.assertions]]
path = ""
equals = 1

[[cases]]
name = "technical_note_owner_accepts_deleting_attachment"
kind = "schema_behavior"
setup_sql = [
    "CREATE technical_note:attachment_note CONTENT { title: 'Water pump', body: 'Use the locking tool.' };",
]
action_sql = "CREATE attachment:note_photo CONTENT { technical_note: technical_note:attachment_note, display_name: 'Procedure.png', media_type: 'image/png', file: f'pipauto_attachments:/note-photo', storage_state: 'deleting' };"
expect_success = true
verify_sql = "RETURN count(SELECT * FROM attachment WHERE id = attachment:note_photo AND vehicle IS NONE AND intervention IS NONE AND technical_note = technical_note:attachment_note AND storage_state = 'deleting');"

[[cases.assertions]]
path = ""
equals = 1

