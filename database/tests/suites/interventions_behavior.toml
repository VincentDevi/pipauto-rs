[[cases]]
name = "service_history_order_is_deterministic_for_equal_dates"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:history_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:history_vehicle CONTENT { customer: customer:history_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:history_a CONTENT { vehicle: vehicle:history_vehicle, service_date: d'2026-07-01T00:00:00Z', created_at: d'2026-07-02T10:00:00Z' };",
    "CREATE intervention:history_b CONTENT { vehicle: vehicle:history_vehicle, service_date: d'2026-07-01T00:00:00Z', created_at: d'2026-07-02T10:00:00Z' };",
]
action_sql = "RETURN true;"
expect_success = true
verify_sql = "SELECT VALUE id FROM intervention WHERE vehicle = vehicle:history_vehicle ORDER BY service_date DESC, created_at DESC, id DESC;"

[[cases.assertions]]
path = "[0]"
equals = "intervention:history_b"

[[cases.assertions]]
path = "[1]"
equals = "intervention:history_a"
