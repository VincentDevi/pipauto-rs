name = "interventions_behavior"
tags = ["interventions", "behavior"]

[[cases]]
name = "vehicle_reference_rejects_deletion"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:intervention_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:intervention_vehicle CONTENT { customer: customer:intervention_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:vehicle_delete_guard CONTENT { vehicle: vehicle:intervention_vehicle, service_date: d'2026-07-01T00:00:00Z' };",
]
action_sql = "DELETE vehicle:intervention_vehicle;"
expect_success = false

[[cases]]
name = "completion_requires_work_and_consistent_timestamp"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:completion_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:completion_vehicle CONTENT { customer: customer:completion_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:completion_guard CONTENT { vehicle: vehicle:completion_vehicle, service_date: d'2026-07-01T00:00:00Z' };",
]
action_sql = "UPDATE intervention:completion_guard SET status = 'completed', completed_at = time::now();"
expect_success = false

[[cases]]
name = "completed_intervention_and_lines_are_frozen_and_durable"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:durable_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:durable_vehicle CONTENT { customer: customer:durable_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:durable CONTENT { vehicle: vehicle:durable_vehicle, service_date: d'2026-07-01T00:00:00Z', performed_work: 'Oil service' };",
    "CREATE intervention_line:durable_line CONTENT { intervention: intervention:durable, category: 'material', description: 'Engine oil', quantity: 4.5dec, unit_label: 'litre', currency: 'EUR', unit_price_minor: 1200, unit_cost_minor: 700, total_price_minor: 5400, total_cost_minor: 3150, position: 0 };",
    "UPDATE intervention:durable SET status = 'completed', completed_at = time::now();",
]
action_sql = "DELETE intervention_line:durable_line;"
expect_success = false
verify_sql = "RETURN count(SELECT * FROM intervention:durable, intervention_line:durable_line);"

[[cases.assertions]]
path = ""
equals = 2

[[cases]]
name = "completed_intervention_cannot_be_deleted"
kind = "schema_behavior"
setup_sql = [
    "CREATE customer:completed_delete_owner CONTENT { display_name: 'Owner', display_name_normalized: 'owner' };",
    "CREATE vehicle:completed_delete_vehicle CONTENT { customer: customer:completed_delete_owner, make: 'Volkswagen', make_normalized: 'volkswagen', model: 'Golf', model_normalized: 'golf' };",
    "CREATE intervention:completed_delete_guard CONTENT { vehicle: vehicle:completed_delete_vehicle, service_date: d'2026-07-01T00:00:00Z', performed_work: 'Inspection completed' };",
    "UPDATE intervention:completed_delete_guard SET status = 'completed', completed_at = time::now();",
]
action_sql = "DELETE intervention:completed_delete_guard;"
expect_success = false
verify_sql = "RETURN count(SELECT * FROM intervention WHERE id = intervention:completed_delete_guard AND status = 'completed' AND completed_at IS NOT NONE);"

[[cases.assertions]]
path = ""
equals = 1

