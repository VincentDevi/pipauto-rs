<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    {% if csrf_token is defined and csrf_token %}<meta name="csrf-token" content="{{ csrf_token }}">{% endif %}
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-content">
        <a class="brand" href="/" aria-label="Pipauto home">Pipauto</a>
        {% if current_user is defined and current_user %}
          <nav aria-label="Primary navigation" class="account-navigation">
            <a href="/"{% if current_path == "/" %} aria-current="page"{% endif %}>Workshop</a>
            <span>{{ current_user.display_name }}</span>
            <form method="post" action="/logout" hx-post="/logout">
              <input type="hidden" name="_csrf" value="{{ csrf_token }}">
              <button type="submit" class="button-link">Sign out</button>
            </form>
          </nav>
        {% endif %}
      </div>
    </header>
    <main id="main-content" class="shell">
      {% block content %}{% endblock content %}
    </main>
    <script src="/static/vendor/htmx.min.js" defer></script>
    <script src="/static/js/app.js?v=2" defer></script>
  </body>
</html>
