<section id="login-region" class="auth-card" aria-labelledby="auth-unavailable-heading" role="alert">
  <h1 id="auth-unavailable-heading">{{ heading }}</h1>
  <p>{{ message }}</p>
  <p class="correlation-reference">Reference: <code>{{ correlation_id }}</code></p>
  <p><a href="/login">Return to sign in</a></p>
</section>
