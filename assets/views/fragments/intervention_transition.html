<section class="customer-workflow" aria-labelledby="transition-heading"><header class="page-header"><div><p class="eyebrow">Intervention transition</p><h1 id="transition-heading">{{ heading }}</h1></div><a class="button button--secondary" href="/interventions/{{ id }}">Back to intervention</a></header><div class="card"><p>{{ explanation }}</p><dl class="metadata-list"><div><dt>Vehicle</dt><dd>{{ vehicle }}</dd></div><div><dt>Service date</dt><dd>{{ service_date }}</dd></div><div><dt>Recorded mileage</dt><dd>{% if mileage %}{{ mileage }} km{% else %}Not recorded{% endif %}</dd></div><div><dt>Authoritative total</dt><dd>{{ total }}</dd></div><div><dt>Work summary</dt><dd>{{ work_summary }}</dd></div></dl><form method="post" action="{{ action }}" hx-post="{{ action }}"><input type="hidden" name="_csrf" value="{{ csrf_token }}"><div class="form-actions"><a class="button button--secondary" href="/interventions/{{ id }}">Keep as Draft</a><button class="button{% if destructive %} button--danger{% endif %}" type="submit">{{ action_label }}</button></div></form></div></section>
